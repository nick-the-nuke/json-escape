name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          args: --release
      - name: Install cross-strip tool (aarch64 Linux)
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu
      - name: Strip binary (non-Windows)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/json-escape
          else
            strip target/${{ matrix.target }}/release/json-escape
          fi
      - name: Archive (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf json-escape-${{ matrix.target }}.tar.gz json-escape
      - name: Archive (Windows)
        if: ${{ contains(matrix.target, 'windows') }}
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive json-escape.exe json-escape-${{ matrix.target }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/json-escape-${{ matrix.target }}.*

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
